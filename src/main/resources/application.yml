spring:
  application:
    name: excel-to-json-migration

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always

  datasource:
    url: jdbc:h2:mem:batchdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

# Migration Configuration
migration:
  input:
    file-path: input/sample-data.xlsx
    sheet-name: Sheet1
  output:
    directory: output/json
    file-prefix: migrated-data
  chunk-size: 10
  metadata:
    table-name: migration_metadata